name: Build MATI Cross-Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías de Python
      run: |
        pip install pyinstaller pywebview
      shell: bash

    - name: Compilar ejecutable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --windowed --onefile --name "MATI" --add-data "frontend;frontend" --add-data "core;core" main.py

    - name: Compilar ejecutable (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --windowed --name "MATI" --add-data "frontend:frontend" --add-data "core:core" main.py

    - name: Guardar Artifacts (Descargables)
      uses: actions/upload-artifact@v4
      with:
        name: MATI-${{ matrix.os }}
        path: dist/
