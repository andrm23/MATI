name: Build and Public Release

on:
  push:
    tags:
      - 'v*' # Se activa al subir tags como v1.1.3
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install pyinstaller pywebview
      
      # --- BUILD WINDOWS ---
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: pyinstaller --windowed --onefile --name "MATI" --add-data "frontend;frontend" --add-data "core;core" main.py
        
      - name: Upload Windows to Release
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          repository: lexrammart/MATI-Releases 
          token: ${{ secrets.RELEASE_TOKEN }}
          target_commitish: main
          tag_name: ${{ github.ref_name }}
          files: dist/MATI.exe

      # --- BUILD MAC ---
      - name: Build Mac
        if: matrix.os == 'macos-latest'
        run: pyinstaller --windowed --name "MATI" --add-data "frontend:frontend" --add-data "core:core" main.py

      - name: Zip Mac App
        if: matrix.os == 'macos-latest'
        run: cd dist && zip -r MATI-macOS.zip MATI.app

      - name: Upload Mac to Release
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          repository: lexrammart/MATI-Releases 
          token: ${{ secrets.RELEASE_TOKEN }}
          target_commitish: main
          tag_name: ${{ github.ref_name }}
          files: dist/MATI-macOS.zip
